name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    name: Build and release patch bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build patch bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew clean :patches:buildAndroid generatePatchesList --no-daemon

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(grep '^version *= *' gradle.properties | head -n1 | cut -d= -f2 | tr -d '[:space:]')"
          TAG="v${VERSION}"
          TITLE="${TAG}"
          BUNDLE_FILE="patches/build/libs/patches-${VERSION}.mpp"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "bundle_file=${BUNDLE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            ${{ steps.meta.outputs.bundle_file }}
