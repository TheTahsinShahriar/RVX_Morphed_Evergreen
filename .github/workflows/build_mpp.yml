name: Build MPP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-mpp:
    name: Build patch bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build patch bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :patches:buildAndroid generatePatchesList --no-daemon

      - name: Upload MPP artifact
        uses: actions/upload-artifact@v6
        with:
          name: rvx-morphed-evergreen-mpp
          path: |
            patches/build/libs/*.mpp
            patches-list.json
            README.md
          if-no-files-found: error
